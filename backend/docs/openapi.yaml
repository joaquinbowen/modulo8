openapi: 3.0.0
info:
  title: API Gestión de Tareas
  version: 1.0.0
  description: API para gestión de tareas con autenticación JWT
  contact:
    name: Soporte
    email: support@example.com
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Servidor local

paths:
  /api/registrar:
    post:
      summary: Registrar un nuevo usuario
      description: Crea una nueva cuenta de usuario con email y contraseña
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: miContraseña123
      responses:
        '201':
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario registrado correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: usuario@example.com
                      rol:
                        type: string
                        example: usuario
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: El email ya está registrado

  /api/login:
    post:
      summary: Iniciar sesión
      description: Autentica un usuario y retorna un token JWT
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@example.com
                password:
                  type: string
                  format: password
                  example: miContraseña123
      responses:
        '200':
          description: Usuario autenticado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario loggeado correctamente
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '500':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email o contraseña incorrectos

  /api/logout:
    post:
      summary: Cerrar sesión
      description: Revoca el token JWT actual agregándolo a la lista negra
      tags:
        - Autenticación
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Usuario deslogueado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario deslogueado correctamente
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No se proporciono el token

  /api/tareas:
    get:
      summary: Obtener todas las tareas del usuario
      description: Retorna la lista de tareas del usuario autenticado
      tags:
        - Tareas
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Tareas obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tareas obtenidas correctamente
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        titulo:
                          type: string
                          example: Comprar leche
                        descripcion:
                          type: string
                          example: Ir al supermercado
                        completada:
                          type: boolean
                          example: false
                        usuarioId:
                          type: integer
                          example: 1
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al obtener las tareas

    post:
      summary: Crear una nueva tarea
      description: Crea una nueva tarea para el usuario autenticado
      tags:
        - Tareas
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
              properties:
                titulo:
                  type: string
                  example: Comprar leche
                descripcion:
                  type: string
                  example: Ir al supermercado a comprar leche
                completada:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Tarea creada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tarea creada correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      titulo:
                        type: string
                        example: Comprar leche
                      descripcion:
                        type: string
                        example: Ir al supermercado
                      completada:
                        type: boolean
                        example: false
                      usuarioId:
                        type: integer
                        example: 1
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al crear la tarea

  /api/tareas/{id}:
    delete:
      summary: Eliminar una tarea
      description: Elimina una tarea específica (solo administradores)
      tags:
        - Tareas
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la tarea a eliminar
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Tarea eliminada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tarea eliminada correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      titulo:
                        type: string
                        example: Comprar leche
                      descripcion:
                        type: string
                        example: Ir al supermercado
                      completada:
                        type: boolean
                        example: false
                      usuarioId:
                        type: integer
                        example: 1
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '403':
          description: Acceso denegado - se requiere rol de administrador
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No tienes permisos para realizar esta acción
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al eliminar la tarea

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido al hacer login

  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        rol:
          type: string
          enum: [usuario, admin]

    Tarea:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        descripcion:
          type: string
        completada:
          type: boolean
        usuarioId:
          type: integer

tags:
  - name: Autenticación
    description: Endpoints para registro, login y logout
  - name: Tareas
    description: Endpoints para gestionar tareas